    <style>
        /* ====== 編輯器專屬排版 (獨立寫入確保不影響其他頁面) ====== */
        .editor-body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 100px 20px 60px; box-sizing: border-box; position: relative; z-index: 10; }
        .editor-tabs { width: 100%; max-width: 800px; display: flex; gap: 12px; margin-bottom: 20px; }
        .editor-tabs .glass-btn { flex: 1; justify-content: center; font-size: 1.1rem; padding: 16px; opacity: 0.6; }
        .editor-tabs .glass-btn.active { opacity: 1; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.15); }
        .editor-panel { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 24px; padding: 40px 50px; margin: 0 auto; box-sizing: border-box; }
        .input-group { display: flex; flex-direction: column; gap: 8px; background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-group label { color: #ccc; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; margin-left: 4px; margin-bottom: 8px; }
        .file-input-wrapper { display: flex; align-items: center; padding: 12px 16px; background: transparent; border: 1px solid rgba(255,255,255,0.1); }
        .file-input-wrapper input[type="file"] { color: white; font-size: 0.9rem; cursor: pointer; width: 100%; }
        .editor-toolbar { display: flex; flex-direction: row; gap: 12px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); background: transparent; }
        .editor-toolbar button { padding: 8px 16px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .editor-content { min-height: 400px; overflow-y: auto; outline: none; line-height: 1.6; padding: 0; font-size: 1.1rem; background: transparent; border: none; color: white; }
        .editor-content:empty:before { content: attr(placeholder); color: rgba(255,255,255,0.4); pointer-events: none; }
        .editor-actions { display: flex; gap: 16px; justify-content: flex-end; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 24px; }
        .primary-btn { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.5); font-weight: bold; }
        .primary-btn:hover { background: rgba(255, 255, 255, 0.25); }

        /* 管理文章列表 */
        .manage-list { display: flex; flex-direction: column; gap: 16px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 16px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .manage-info h4 { margin: 0 0 4px 0; color: white; font-size: 1.1rem; }
        .manage-info span { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .delete-btn { border-color: rgba(255, 100, 100, 0.5) !important; color: #ff6b6b !important; }
        .delete-btn:hover { background: rgba(255, 100, 100, 0.2) !important; }
    </style>
</head>
