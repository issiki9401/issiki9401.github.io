<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home of Issiki9401</title>
    <link rel="stylesheet" href="css/style.css?v=update23">
</head>
<body>
    <div class="video-background">
        <div class="video-foreground">
            <iframe id="yt-player" src="https://www.youtube-nocookie.com/embed/52rTsrwZcGQ?controls=0&showinfo=0&rel=0&autoplay=1&loop=1&playlist=52rTsrwZcGQ&mute=1&enablejsapi=1"
    frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
        </div>
        <div class="video-overlay"></div>
    </div>
    
    <header class="mac-glass-nav" id="glass-nav">
        <div class="nav-brand" style="cursor: pointer;" onclick="window.location.hash=''">Issiki9401</div>
        <nav class="nav-menu">
            <a href="#" class="glass-btn">分類</a>
            <a href="#" class="glass-btn">工具</a>
            <a href="#about" id="nav-about-btn" class="glass-btn">關於</a>
            <div class="glass-btn search-wrapper">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="glass-input" placeholder="搜尋...">
            </div>
        </nav>
    </header>

    <div class="side-controls">
        <button id="play-pause-btn" class="glass-btn icon-btn" data-tooltip="背景影片：暫停 / 播放">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>
        <button id="mute-btn" class="glass-btn icon-btn" data-tooltip="背景影片：開啟聲音 / 靜音">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        </button>
    </div>

    <div class="glass-panel music-banner" id="music-banner">
        <div class="music-info">
            <img src="https://img.youtube.com/vi/_Yn2aIz9SjQ/mqdefault.jpg" alt="Cover" class="music-cover" id="music-cover">
            <div class="music-text">
                <h3 id="music-title">夜航星 (Night Voyager)</h3>
                <span>YouTube Music</span>
            </div>
        </div>
        
        <div class="music-player-ui">
            <div class="music-controls">
                <button id="music-play-btn" class="glass-btn icon-btn play-main-btn" title="播放/暫停">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </button>
                <button id="music-next-btn" class="glass-btn icon-btn" title="下一首">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                </button>
            </div>
            
            <div class="music-progress-bar">
                <span id="music-current">00:00</span>
                <input type="range" id="music-slider" class="music-slider" value="0" min="0" max="100">
                <span id="music-duration">00:00</span>
            </div>
        </div>
    </div>

    <div id="yt-music-iframe-container" style="position: absolute; left: -9999px; top: -9999px; width: 200px; height: 200px;">
        <div id="yt-music-iframe"></div>
    </div>

    <div class="hero-content" id="hero-content">
        <h1 class="hero-title">Welcome to Issiki9401's Blog</h1>
        <div class="scroll-indicator" id="scroll-arrow" title="往下捲動">
            <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>

    <main class="content-section" id="view-home">
        <div class="glass-carousel" id="reveal-carousel">
            <div class="carousel-viewport">
                <div class="carousel-track" id="carousel-track">
                    <img src="assets/images/slide-1.png" alt="Slide 1" class="carousel-slide active">
                    <img src="assets/images/slide-2.png" alt="Slide 2" class="carousel-slide">
                    <img src="assets/images/slide-3.png" alt="Slide 3" class="carousel-slide">
                    <img src="assets/images/slide-4.png" alt="Slide 4" class="carousel-slide">
                    <img src="assets/images/slide-5.png" alt="Slide 5" class="carousel-slide">
                </div>
            </div>
            <button class="carousel-btn prev" id="prev-btn"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <button class="carousel-btn next" id="next-btn"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>

        <div class="login-bar-container">
            <button id="login-toggle-btn" class="glass-btn ripple-btn">登入以編輯</button>
            <div id="login-form-box" class="login-form-hidden glass-panel">
                <input type="password" id="admin-password" class="form-control" placeholder="輸入管理員密碼...">
                <button id="login-btn" class="glass-btn" style="width:100%; justify-content:center;">確認登入</button>
            </div>
        </div>

        <div id="blog-container" class="blog-container"></div>
        <div id="pagination-container" class="pagination-container"></div>
    </main>

    <main class="page-container" id="view-about" style="display: none;">
        <div class="top-back-nav">
            <button onclick="window.location.hash=''" class="glass-btn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="margin-right:8px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 上一頁</button>
        </div>
        <div class="glass-panel content-panel">
            <h1>Welcome to Issiki9401's linktree!</h1>
            <p>//Issiki9401的連結存放區//</p>
            <p>issiki的發音近似於伊斯ㄍㄧ, 日文發作いっしき!</p>
            <nav>
                <ul>
                    <li><a href="https://www.twitch.tv/nvst9401">twitch</a></li>
                    <li><a href="https://twitter.com/Issiki9401">Twitter(X)</a></li>
                    <li><a href="https://discord.gg/jeaa5e2dec">Discord伺服器</a></li>
                </ul>
            </nav>   
            <p style="opacity: 0.5; font-size: 0.85rem; margin-top: 40px;">2026/4/28編輯</p>
        </div>
        <div style="display: flex; justify-content: center; margin-top: 40px; margin-bottom: 20px;">
            <button onclick="window.location.hash=''" class="glass-btn" style="padding: 12px 30px; font-size: 1.1rem;"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="margin-right:8px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 上一頁</button>
        </div>
    </main>

    <main class="page-container" id="view-post" style="display: none;">
        <div class="top-back-nav">
            <button onclick="window.location.hash=''" class="glass-btn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="margin-right:8px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 上一頁</button>
        </div>
        <div id="post-detail-container" class="glass-panel content-panel">
            <div style="text-align: center; opacity: 0.7;">文章載入中...</div>
        </div>
        <div style="display: flex; justify-content: center; margin-top: 40px; margin-bottom: 20px;">
            <button onclick="window.location.hash=''" class="glass-btn" style="padding: 12px 30px; font-size: 1.1rem;"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="margin-right:8px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 上一頁</button>
        </div>
    </main>

    <script src="js/script.js?v=update23"></script>
</body>
</html>
